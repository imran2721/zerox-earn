<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USDT Goal Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg: #0a1613;
    --panel: #0f221c;
    --panel-border: #1c3a30;
    --tether: #26a17b;
    --tether-light: #4fd8ab;
    --gold: #d9a441;
    --text: #eaf3ee;
    --muted: #6f8f83;
    --danger: #d97757;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: radial-gradient(circle at 50% -10%, #123227 0%, var(--bg) 55%);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    min-height: 100vh;
  }

  .app {
    width: 100%;
    max-width: 420px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--tether-light);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .eyebrow::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--tether-light);
    box-shadow: 0 0 8px var(--tether-light);
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 34px;
    margin: 0 0 26px 0;
    letter-spacing: -0.01em;
  }
  h1 span { color: var(--muted); font-weight: 500; font-size: 18px; }

  .tank-card {
    background: linear-gradient(180deg, var(--panel), #0b1c17);
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    padding: 26px;
    display: flex;
    gap: 22px;
    align-items: center;
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.6);
  }

  .tank-wrap {
    position: relative;
    width: 110px;
    height: 190px;
    flex-shrink: 0;
  }

  .tank-outline {
    position: absolute;
    inset: 0;
    border: 2px solid var(--panel-border);
    border-radius: 20px;
    overflow: hidden;
    background: #081410;
  }

  .tank-fill {
    position: absolute;
    left: -25%;
    width: 150%;
    bottom: 0;
    height: 0%;
    transition: height 900ms cubic-bezier(.22,1,.36,1);
  }

  .tank-fill svg { display: block; width: 100%; }

  .wave-body {
    fill: var(--tether);
  }

  .tank-pct {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 22px;
    color: var(--text);
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    mix-blend-mode: normal;
    z-index: 2;
  }

  .tank-target-mark {
    position: absolute;
    left: -6px; right: -6px;
    top: 0;
    height: 1px;
    background: repeating-linear-gradient(90deg, var(--gold) 0 4px, transparent 4px 8px);
  }

  .side-stats { flex: 1; display: flex; flex-direction: column; gap: 16px; }

  .stat-row .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .stat-row .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    margin-top: 2px;
  }
  .stat-value.remaining { color: var(--gold); }
  .stat-value.saved { color: var(--tether-light); }

  .bar-track {
    margin-top: 22px;
    width: 100%;
    height: 10px;
    border-radius: 6px;
    background: #081410;
    border: 1px solid var(--panel-border);
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--tether), var(--tether-light));
    border-radius: 6px;
    transition: width 900ms cubic-bezier(.22,1,.36,1);
  }

  .controls {
    margin-top: 22px;
    display: flex;
    gap: 8px;
  }

  input[type=number] {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 13px 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    outline: none;
  }
  input[type=number]:focus { border-color: var(--tether); }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin:0; }

  button {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    border: none;
    border-radius: 12px;
    padding: 13px 18px;
    cursor: pointer;
    transition: transform 120ms ease, opacity 120ms ease;
  }
  button:active { transform: scale(0.96); }

  .btn-add {
    background: var(--tether);
    color: #04150f;
  }
  .btn-add:hover { background: var(--tether-light); }

  .btn-minus {
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
  }
  .btn-minus:hover { background: rgba(217,119,87,0.12); }

  .btn-reset {
    margin-top: 10px;
    width: auto;
    display: block;
    margin-left: auto;
    margin-right: auto;
    padding: 7px 14px;
    font-size: 11px;
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--muted);
  }
  .btn-reset:hover { color: var(--danger); border-color: var(--danger); }

  .history {
    margin-top: 26px;
  }
  .history-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 160px;
    overflow-y: auto;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 9px 12px;
  }
  .history-item .amt { color: var(--tether-light); }
  .history-item .amt-neg { color: var(--danger); }
  .history-item .date { color: var(--muted); }
  .empty-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    padding: 10px 2px;
  }

  .goal-hit {
    margin-top: 18px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    color: var(--tether-light);
    font-size: 13px;
    letter-spacing: 0.06em;
    display: none;
  }
  .goal-hit.show { display: block; }
</style>
</head>
<body>
<div class="app">
  <div class="eyebrow">Savings Goal</div>
  <h1>100 <span>USDT</span></h1>

  <div class="tank-card">
    <div class="tank-wrap">
      <div class="tank-outline">
        <div class="tank-fill" id="tankFill">
          <svg viewBox="0 0 200 20" preserveAspectRatio="none">
            <path class="wave-body" id="wavePath" d="M0,10 C 25,20 75,0 100,10 C 125,20 175,0 200,10 L200,20 L0,20 Z"></path>
          </svg>
          <div style="background: var(--tether); width:100%; height: 200px; margin-top:-1px;"></div>
        </div>
      </div>
      <div class="tank-pct" id="tankPct">0%</div>
    </div>

    <div class="side-stats">
      <div class="stat-row">
        <div class="stat-label">Saved</div>
        <div class="stat-value saved" id="savedVal">$0.00</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">Remaining</div>
        <div class="stat-value remaining" id="remainingVal">$100.00</div>
      </div>
    </div>
  </div>

  <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>

  <div class="controls">
    <input type="number" id="amountInput" placeholder="Amount in USDT" min="0" step="0.01">
    <button class="btn-minus" id="minusBtn">−</button>
    <button class="btn-add" id="addBtn">Add</button>
  </div>
  <button class="btn-reset" id="resetBtn">Reset progress</button>

  <div class="goal-hit" id="goalHit">🎉 Goal reached — 100 USDT saved</div>

  <div class="history">
    <div class="history-title">History</div>
    <div class="history-list" id="historyList">
      <div class="empty-note">No entries yet. Add your first deposit above.</div>
    </div>
  </div>
</div>

<script>
const TARGET = 100;
const STORAGE_KEY = 'usdt-goal-state';
let state = { current: 0, history: [] };

const tankFill = document.getElementById('tankFill');
const tankPct = document.getElementById('tankPct');
const savedVal = document.getElementById('savedVal');
const remainingVal = document.getElementById('remainingVal');
const barFill = document.getElementById('barFill');
const historyList = document.getElementById('historyList');
const goalHit = document.getElementById('goalHit');
const amountInput = document.getElementById('amountInput');

function fmt(n){
  return '$' + n.toFixed(2);
}

function render(){
  const pct = Math.max(0, Math.min(100, (state.current / TARGET) * 100));
  tankFill.style.height = pct + '%';
  tankPct.textContent = Math.round(pct) + '%';
  savedVal.textContent = fmt(state.current);
  remainingVal.textContent = fmt(Math.max(0, TARGET - state.current));
  barFill.style.width = pct + '%';
  goalHit.classList.toggle('show', state.current >= TARGET);

  if(state.history.length === 0){
    historyList.innerHTML = '<div class="empty-note">No entries yet. Add your first deposit above.</div>';
  } else {
    historyList.innerHTML = state.history
      .slice()
      .reverse()
      .map(h => {
        const isNeg = h.amount < 0;
        const sign = isNeg ? '−' : '+';
        const cls = isNeg ? 'amt-neg' : 'amt';
        return `<div class="history-item"><span class="${cls}">${sign}${Math.abs(h.amount).toFixed(2)} USDT</span><span class="date">${h.date}</span></div>`;
      })
      .join('');
  }
}

async function load(){
  try {
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      state = JSON.parse(res.value);
    }
  } catch(e) {
    // no saved state yet, keep defaults
  }
  render();
}

async function save(){
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
  } catch(e) {
    console.error('Storage error:', e);
  }
}

document.getElementById('addBtn').addEventListener('click', async () => {
  const val = parseFloat(amountInput.value);
  if(!val || val <= 0) return;
  state.current = Math.round((state.current + val) * 100) / 100;
  state.history.push({
    amount: val,
    date: new Date().toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
  });
  amountInput.value = '';
  render();
  await save();
});

document.getElementById('minusBtn').addEventListener('click', async () => {
  const val = parseFloat(amountInput.value);
  if(!val || val <= 0) return;
  state.current = Math.max(0, Math.round((state.current - val) * 100) / 100);
  state.history.push({
    amount: -val,
    date: new Date().toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
  });
  amountInput.value = '';
  render();
  await save();
});

amountInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') document.getElementById('addBtn').click();
});

document.getElementById('resetBtn').addEventListener('click', async () => {
  const ok = confirm('Reset progress? This clears your saved amount and history — this cannot be undone.');
  if(!ok) return;
  state = { current: 0, history: [] };
  render();
  await save();
});

// gentle wave animation
let waveOffset = 0;
function animateWave(){
  waveOffset += 0.6;
  const path = document.getElementById('wavePath');
  const y1 = 10 + Math.sin(waveOffset * 0.05) * 3;
  const y2 = 10 + Math.sin(waveOffset * 0.05 + Math.PI) * 3;
  path.setAttribute('d', `M0,${y1} C 25,${y1+8} 75,${y1-8} 100,${y1} C 125,${y1+8} 175,${y1-8} 200,${y1} L200,20 L0,20 Z`);
  requestAnimationFrame(animateWave);
}
animateWave();

load();
</script>
</body>
</html>
